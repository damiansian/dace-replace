<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L17: Independent Review Methodology — DACE Deliver Badge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--slide-w:1440px;--slide-h:900px;--badge-green:#51CF66;--badge-green-light:#EBFBEE;--badge-green-dark:#2B8A3E;--black:#1A1A1A;--dark:#333;--mid:#666;--light-gray:#F5F5F5;--border-gray:#E0E0E0;--white:#FFFFFF;--insight-bg:#F5F7FA;--font:'DM Sans',system-ui,sans-serif}
  body{font-family:var(--font);background:#1a1a2e;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px;color:var(--black)}
  .nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:rgba(0,0,0,0.85);padding:10px 20px;border-radius:40px;z-index:100;backdrop-filter:blur(10px)}
  .nav button{background:none;border:1px solid rgba(255,255,255,0.3);color:white;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .nav button:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.6)}
  .nav .counter{color:rgba(255,255,255,0.7);font-size:13px;font-variant-numeric:tabular-nums;min-width:60px;text-align:center}
  .slide-container{width:var(--slide-w);max-width:100%;aspect-ratio:1440/900}
  .slide{display:none;width:var(--slide-w);height:var(--slide-h);background:var(--white);position:relative;overflow:hidden;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
  .slide.active{display:block}
  .topbar{position:absolute;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;border-bottom:1px solid var(--border-gray);z-index:10}
  .topbar-left{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--dark)}
  .topbar-icon{width:32px;height:32px;border:1.5px solid var(--dark);border-radius:6px;display:flex;align-items:center;justify-content:center}
  .topbar-icon svg{width:16px;height:16px}
  .topbar-lesson{font-weight:600}
  .topbar-sep{color:#ccc}
  .topbar-topic{font-weight:400}
  .badge-pill{display:flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:var(--badge-green-light);border:1.5px solid var(--badge-green);font-size:13px;font-weight:600;color:var(--badge-green-dark)}
  .badge-pill svg{width:14px;height:14px}
  .footer-text{position:absolute;bottom:40px;left:18px;writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:#999;letter-spacing:0.02em;line-height:1.4}
  .content{position:absolute;top:64px;left:70px;right:40px;bottom:20px;padding:40px 0}
  .slide.divider .topbar{border-bottom-color:transparent}
  .divider-bg{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden}
  .divider-bg .geo{position:absolute;stroke:#ddd;stroke-width:1.5;fill:none}
  .divider-title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:64px;font-weight:700;color:var(--black);text-align:center;line-height:1.15;max-width:900px}
  h1.slide-headline{font-size:48px;font-weight:700;color:var(--black);line-height:1.15;margin-bottom:24px;letter-spacing:-0.02em}
  h2.slide-subhead{font-size:20px;font-weight:600;color:var(--dark);margin-bottom:16px}
  .slide-body{font-size:18px;color:var(--dark);line-height:1.5;margin-bottom:16px}
  .slide-intro{font-size:20px;font-weight:600;color:var(--dark);line-height:1.5;margin-bottom:24px}
  .bullet-list{list-style:none;padding:0}
  .bullet-list li{font-size:18px;color:var(--dark);line-height:1.55;padding:6px 0 6px 20px;position:relative}
  .bullet-list li::before{content:'•';position:absolute;left:0;color:#999}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:24px}
  .col-card{background:var(--white);border:1px solid var(--border-gray);border-radius:12px;padding:28px}
  .col-card h3{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--black)}
  .col-card.green-accent{border-top:3px solid var(--badge-green)}
  .col-card.gray-accent{border-top:3px solid #ccc}
  .three-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
  .five-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
  .card{background:var(--light-gray);border-radius:12px;padding:20px}
  .card h4{font-size:15px;font-weight:700;color:var(--black);margin-bottom:8px}
  .card p{font-size:13px;color:var(--mid);line-height:1.45}
  .card .card-tag{font-size:11px;color:#888;margin-top:8px;font-style:italic}
  .slide-table{width:100%;border-collapse:collapse;margin-bottom:24px;font-size:15px}
  .slide-table th{background:var(--light-gray);font-weight:600;text-align:left;padding:12px 16px;border-bottom:2px solid var(--border-gray);color:var(--black)}
  .slide-table td{padding:12px 16px;border-bottom:1px solid var(--border-gray);color:var(--dark);line-height:1.4;vertical-align:top}
  .slide-table tr:last-child td{border-bottom:none}
  .key-insight{background:var(--insight-bg);border-radius:12px;padding:20px 24px 20px 64px;position:relative;margin-top:16px}
  .key-insight::before{content:'';position:absolute;left:20px;top:50%;transform:translateY(-50%);width:32px;height:32px;background:#3478F6;border-radius:50%}
  .key-insight::after{content:'💡';position:absolute;left:25px;top:50%;transform:translateY(-50%);font-size:16px}
  .key-insight strong{display:block;font-size:15px;font-weight:700;color:var(--black);margin-bottom:4px}
  .key-insight p,.key-insight span{font-size:15px;color:var(--dark);line-height:1.5}
  .checklist{list-style:none;padding:0}
  .checklist li{font-size:17px;color:var(--dark);line-height:1.5;padding:8px 0 8px 36px;position:relative}
  .checklist li::before{content:'';position:absolute;left:0;top:10px;width:20px;height:20px;border:2px solid #ccc;border-radius:4px}
  .outcome-card{background:var(--insight-bg);border-radius:16px;padding:28px;text-align:center}
  .outcome-card .outcome-icon{width:56px;height:56px;background:#3478F6;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:24px}
  .outcome-card .outcome-label{font-size:16px;font-weight:700;color:var(--black);margin-bottom:12px}
  .outcome-card .outcome-text{font-size:14px;color:var(--mid);line-height:1.5}
  .lo-pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;background:var(--badge-green-light);font-size:12px;font-weight:600;color:var(--badge-green-dark);margin-top:8px}
  .objectives-list{list-style:none;padding:0}
  .objectives-list li{padding:16px 0;border-bottom:1px solid var(--border-gray);display:flex;gap:16px;align-items:flex-start}
  .objectives-list li:last-child{border-bottom:none}
  .obj-code{font-size:14px;font-weight:700;color:var(--badge-green-dark);background:var(--badge-green-light);padding:4px 10px;border-radius:6px;white-space:nowrap;flex-shrink:0}
  .obj-text{font-size:17px;color:var(--dark);line-height:1.5}
  .obj-text strong{color:var(--black)}
  .connection-callout{background:var(--badge-green-light);border-left:3px solid var(--badge-green);padding:16px 20px;border-radius:0 8px 8px 0;margin-top:16px}
  .connection-callout p{font-size:14px;color:var(--dark);line-height:1.5}
  .discussion-callout{background:#FFF9DB;border-left:3px solid #FCC419;padding:16px 20px;border-radius:0 8px 8px 0;margin-top:16px}
  .discussion-callout p{font-size:15px;color:var(--dark);line-height:1.5;font-style:italic}
  .discussion-callout strong{font-style:normal;color:var(--black)}
  .flow-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .flow-step{text-align:center;padding:24px 16px;background:var(--light-gray);border-radius:12px;position:relative}
  .flow-step:not(:last-child)::after{content:'→';position:absolute;right:-16px;top:50%;transform:translateY(-50%);font-size:20px;color:#bbb;z-index:2}
  .flow-step .step-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--badge-green);color:white;border-radius:50%;font-size:14px;font-weight:700;margin-bottom:10px}
  .flow-step .step-title{font-size:16px;font-weight:700;color:var(--black);margin-bottom:8px}
  .flow-step .step-desc{font-size:13px;color:var(--mid);line-height:1.4}
  .flow-step .step-artifact{font-size:11px;color:var(--badge-green-dark);font-weight:600;margin-top:8px}
  .example-box{border-radius:10px;padding:16px 20px;margin-bottom:12px;font-size:15px;line-height:1.5}
  .example-box.bad{background:#FFF5F5;border:1px solid #FFC9C9;color:#C92A2A}
  .example-box.good{background:#F0FFF4;border:1px solid #B2F2BB;color:#2B8A3E}
  .example-box .example-label{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;display:block}
  .principles{display:flex;flex-direction:column;gap:16px}
  .principle-row{display:flex;gap:16px;align-items:flex-start;padding:16px;background:var(--light-gray);border-radius:12px}
  .principle-icon{width:44px;height:44px;background:#3478F6;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
  .principle-text{font-size:15px;color:var(--dark);line-height:1.5}
  .principle-text strong{color:var(--black)}
  .practice-callout{background:var(--badge-green-light);border-radius:12px;padding:20px 24px;margin-top:16px}
  .practice-callout strong{font-size:14px;color:var(--badge-green-dark);display:block;margin-bottom:8px}
  .practice-callout p,.practice-callout li{font-size:14px;color:var(--dark);line-height:1.5}
  .practice-callout ol{padding-left:20px;margin-top:4px}
  .title-content{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
  .title-lesson-num{font-size:16px;font-weight:600;color:var(--mid);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px}
  .title-main{font-size:52px;font-weight:700;color:var(--black);line-height:1.1;margin-bottom:12px;letter-spacing:-0.02em}
  .title-subtitle{font-size:22px;color:var(--mid);font-weight:400;margin-bottom:32px;font-style:italic}
  .title-meta{display:flex;gap:24px;font-size:13px;color:#999}
  .title-meta span{padding:4px 12px;background:var(--light-gray);border-radius:16px}
  /* Tier colors */
  .tier-complete{border-left:4px solid var(--badge-green)}
  .tier-followup{border-left:4px solid #FCC419}
  .tier-async{border-left:4px solid #FF922B}
  .tier-project{border-left:4px solid #FA5252}
  .doc-principles{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .doc-principle{background:var(--light-gray);border-radius:10px;padding:16px 20px}
  .doc-principle h4{font-size:15px;font-weight:700;color:var(--black);margin-bottom:4px}
  .doc-principle p{font-size:13px;color:var(--mid);line-height:1.4}
</style>
</head>
<body>
<div class="slide-container" id="slideContainer"></div>
<div class="nav">
  <button onclick="prevSlide()">←</button>
  <span class="counter" id="counter">1 / 21</span>
  <button onclick="nextSlide()">→</button>
</div>
<script>
const TB = `<div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 8l3 3-3 3"/></svg></div><span class="topbar-lesson">Lesson 17</span><span class="topbar-sep">|</span><span class="topbar-topic">Independent Review Methodology</span></div><div class="badge-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Deliver Badge</div></div>`;
const TB_PLAIN = `<div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 8l3 3-3 3"/></svg></div><span class="topbar-lesson">Lesson 17</span><span class="topbar-sep">|</span><span class="topbar-topic">Independent Review Methodology</span></div></div>`;
const FT = `<div class="footer-text">Design Accessibility Certified Expert (DACE)<br>Cohort 1: 2025 – 2026</div>`;
const GEO = `<div class="divider-bg"><svg class="geo" style="left:-20px;top:80px" width="120" height="120" viewBox="0 0 120 120"><polygon points="60,0 120,120 0,120"/></svg><svg class="geo" style="left:-10px;top:320px" width="100" height="100" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80"/></svg><svg class="geo" style="left:-5px;top:540px" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"/></svg></div>`;

const slides = [

// 0.1 TITLE
{type:'title', html:`${TB}
<div class="content"><div class="title-content">
  <div class="title-lesson-num">Lesson 17</div>
  <div class="title-main">Independent Review<br>Methodology</div>
  <div class="title-subtitle">From Tester to Reviewer</div>
  <div class="title-meta"><span>Deliver Badge</span><span>~20 minutes</span><span>In-Person Lesson</span><span>Week 11</span></div>
</div></div>${FT}`},

// 0.2 OBJECTIVES
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">What you'll be able to do</h1>
  <p class="slide-body" style="margin-bottom:24px">By the end of this lesson, you'll be able to:</p>
  <ul class="objectives-list">
    <li><span class="obj-code">3A.01</span><span class="obj-text"><strong>Conduct systematic accessibility reviews:</strong> Perform comprehensive reviews using structured methodology that goes beyond individual checklist items</span></li>
    <li><span class="obj-code">3A.02</span><span class="obj-text"><strong>Document findings using PEAS format:</strong> Write review documentation following Adobe PEAS standards that enables action</span></li>
    <li><span class="obj-code">3A.03</span><span class="obj-text"><strong>Prioritize issues by impact and risk:</strong> Classify findings based on user impact, legal risk, and implementation complexity</span></li>
  </ul>
  <div class="connection-callout"><p>This builds on everything from Badges 1 and 2. Checklist knowledge, AT testing skills, and accessibility tree inspection all become tools in the reviewer's methodology. L17 is where it comes together.</p></div>
</div>${FT}`},

// 1.1 DIVIDER
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">From Tester<br>to Reviewer</div>${FT}`},

// 1.2 MINDSET SHIFT
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Tester vs. Reviewer</h1>
  <div class="two-col">
    <div class="col-card gray-accent">
      <h3>Tester (Badges 1 and 2)</h3>
      <ul class="bullet-list">
        <li>Checks items against a list</li>
        <li>Pass/fail for individual criteria</li>
        <li>Tests specific elements in isolation</li>
        <li>Reports what failed</li>
      </ul>
    </div>
    <div class="col-card green-accent">
      <h3>Reviewer (Badge 3)</h3>
      <ul class="bullet-list">
        <li>Assesses overall accessibility quality</li>
        <li>Evaluates the full user journey</li>
        <li>Identifies patterns across a feature</li>
        <li>Communicates findings that drive decisions</li>
      </ul>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>You are now the person your team looks to for accessibility judgment, not just checklist results.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3A.01</div>
</div>${FT}`},

// 1.3 CHECKPOINT
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: From Tester to Reviewer</h1>
  <p class="slide-intro">Before learning the review methodology, verify you understand this mindset shift:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I understand the difference between checking individual items (testing) and assessing overall quality (reviewing)</li>
        <li>I can explain why a reviewer looks at the full user journey, not just isolated screens</li>
        <li>I recognize that a reviewer identifies patterns, not just individual violations</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3A.01</div>
      <div class="outcome-text">Conduct systematic accessibility reviews: Perform comprehensive reviews using structured methodology.</div>
    </div>
  </div>
</div>${FT}`},

// 2.1 DIVIDER
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Systematic Review<br>Methodology</div>${FT}`},

// 2.2 THREE SCOPING DECISIONS
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Every review starts with three decisions</h1>
  <div class="three-cards">
    <div class="card" style="padding:24px">
      <h4 style="font-size:17px;margin-bottom:12px">Scope</h4>
      <p style="font-size:15px;margin-bottom:8px"><strong>What are you reviewing?</strong></p>
      <p>Full feature, specific flow, single component</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:17px;margin-bottom:12px">Fidelity</h4>
      <p style="font-size:15px;margin-bottom:8px"><strong>What stage is the design?</strong></p>
      <p>Early concept, detailed design, pre-implementation</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:17px;margin-bottom:12px">Time-box</h4>
      <p style="font-size:15px;margin-bottom:8px"><strong>How long do you have?</strong></p>
      <p>30 min focused review, 2-hour comprehensive review</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>These three decisions determine everything: what you check, how deep you go, and what you can realistically cover.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3A.01</div>
</div>${FT}`},

// 2.3 CHECKLIST VS SYSTEMATIC
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">Checklist testing vs. systematic review</h1>
  <div class="two-col">
    <div class="col-card gray-accent">
      <h3>Checklist testing</h3>
      <ul class="bullet-list">
        <li>Go through items one by one</li>
        <li>Pass/fail for each criterion</li>
        <li>Individual violations documented</li>
      </ul>
    </div>
    <div class="col-card green-accent">
      <h3>Systematic review</h3>
      <ul class="bullet-list">
        <li>Assess the experience holistically</li>
        <li>Look for patterns across the feature</li>
        <li>Consider the full user journey</li>
        <li>Weigh patterns against real-world impact</li>
      </ul>
    </div>
  </div>
  <div class="discussion-callout"><strong>Discussion prompt</strong><p>"Think about the last accessibility issue you found. Was it something a checklist caught, or something you noticed because you were actually using the feature? That's the difference."</p></div>
</div>${FT}`},

// 2.4 FIVE REVIEW CATEGORIES
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Review categories</h1>
  <div class="five-cards">
    <div class="card">
      <h4>Visual</h4>
      <p>Color contrast, text sizing, spacing, reflow</p>
      <p class="card-tag">L02, L03, L12</p>
    </div>
    <div class="card">
      <h4>Structural</h4>
      <p>Headings, landmarks, reading order</p>
      <p class="card-tag">L01, L04, L09</p>
    </div>
    <div class="card">
      <h4>Interactive</h4>
      <p>Keyboard access, focus management, error handling</p>
      <p class="card-tag">L04, L05, L06</p>
    </div>
    <div class="card">
      <h4>AT</h4>
      <p>Accessible names, roles, states, announcements</p>
      <p class="card-tag">L09, L10, L11</p>
    </div>
    <div class="card">
      <h4>Cognitive</h4>
      <p>Clarity, consistency, error prevention</p>
      <p class="card-tag">L16</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>A systematic review covers all five categories. You already know how to check each one from Badges 1 and 2. Now you put them together.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3A.01</div>
</div>${FT}`},

// 2.5 CHECKPOINT
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Systematic Review</h1>
  <p class="slide-intro">Before moving to PEAS documentation, verify you understand the review methodology:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can scope a review by defining what I'm reviewing, at what fidelity, and within what time-box</li>
        <li>I understand how systematic review differs from going through a checklist item by item</li>
        <li>I can name the five review categories and connect them to skills from Badges 1 and 2</li>
        <li>I know that fidelity level affects what I can evaluate</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3A.01</div>
      <div class="outcome-text">Conduct systematic accessibility reviews using structured methodology that goes beyond individual checklist items.</div>
    </div>
  </div>

let current = 0;
const container = document.getElementById('slideContainer');
const counter = document.getElementById('counter');
function render() {
  container.innerHTML = `<div class="slide ${slides[current].type === 'divider' ? 'divider' : ''} active">${slides[current].html}</div>`;
  counter.textContent = `${current + 1} / ${slides.length}`;
  scaleSlide();
}
function nextSlide() { if (current < slides.length - 1) { current++; render(); } }
function prevSlide() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});
function scaleSlide() {
  const maxW = Math.min(window.innerWidth - 40, 1440);
  const scale = maxW / 1440;
  const slide = document.querySelector('.slide');
  if (slide && scale < 1) { slide.style.transform = `scale(${scale})`; container.style.height = `${900 * scale}px`; }
  else if (slide) { slide.style.transform = 'none'; container.style.height = '900px'; }
}
window.addEventListener('resize', scaleSlide);
render();
</script>
