<style>

  .divider-bg .geo{position:absolute;stroke:#ddd;stroke-width:1.5;fill:none}
  .divider-title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:64px;font-weight:700;color:var(--black);text-align:center;line-height:1.15;max-width:900px}
  h1.slide-headline{font-size:48px;font-weight:700;color:var(--black);line-height:1.15;margin-bottom:24px;letter-spacing:-0.02em}

  .outcome-card .outcome-text{font-size:14px;color:var(--mid);line-height:1.5}

  .title-content{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
  .title-lesson-num{font-size:16px;font-weight:600;color:var(--mid);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px}

  .title-meta{display:flex;gap:24px;font-size:13px;color:#999}
  .title-meta span{padding:4px 12px;background:var(--light-gray);border-radius:16px}
  .process-flow{display:flex;flex-direction:column;gap:0;margin-bottom:24px}

  .process-step:last-child{border-bottom:none}
  .step-number{width:36px;height:36px;background:var(--badge-green);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;margin-top:2px}
  .step-content{flex:1}
  .step-content h4{font-size:17px;font-weight:700;color:var(--black);margin-bottom:4px}
  .step-content p{font-size:15px;color:var(--mid);line-height:1.45}
  .audience-card{background:var(--light-gray);border-radius:12px;padding:24px;position:relative}
  .audience-card .badge-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;margin-bottom:10px;letter-spacing:0.03em}
  .audience-card h4{font-size:17px;font-weight:700;color:var(--black);margin-bottom:8px}
  .audience-card p{font-size:14px;color:var(--mid);line-height:1.5}
  .tag-discover{background:#E5E5F9;color:#5151D3}
  .tag-define{background:#FFE3E3;color:#C92A2A}
  .tag-untrained{background:#E8E8E8;color:#555}
</style>

<script>
const TB = `<div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 8l3 3-3 3"/></svg></div><span class="topbar-lesson">Lesson 18</span><span class="topbar-sep">|</span><span class="topbar-topic">Feedback and Critique</span></div><div class="badge-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Deliver Badge</div></div>`;
const TB_PLAIN = `<div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 8l3 3-3 3"/></svg></div><span class="topbar-lesson">Lesson 18</span><span class="topbar-sep">|</span><span class="topbar-topic">Feedback and Critique</span></div></div>`;
const FT = `<div class="footer-text">Design Accessibility Certified Expert (DACE)<br>Cohort 1: 2025 – 2026</div>`;
const GEO = `<div class="divider-bg"><svg class="geo" style="left:-20px;top:80px" width="120" height="120" viewBox="0 0 120 120"><polygon points="60,0 120,120 0,120"/></svg><svg class="geo" style="left:-10px;top:320px" width="100" height="100" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80"/></svg><svg class="geo" style="left:-5px;top:540px" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"/></svg></div>`;

const slides = [

// ===== 0.1 TITLE =====
{type:'title', html:`${TB}
<div class="content"><div class="title-content">
  <div class="title-lesson-num">Lesson 18</div>
  <div class="title-main">Feedback and Critique</div>
  <div class="title-subtitle">How to deliver accessibility feedback that leads to action</div>
  <div class="title-meta"><span>Deliver Badge</span><span>~20 minutes</span><span>In-Person Lesson</span><span>Week 11</span></div>
</div></div>${FT}`},

// ===== 0.2 OBJECTIVES =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">What you'll be able to do</h1>
  <p class="slide-body" style="margin-bottom:24px">By the end of this lesson, you'll be able to:</p>
  <ul class="objectives-list">
    <li><span class="obj-code">3B.01</span><span class="obj-text"><strong>Deliver constructive accessibility feedback:</strong> Provide specific, actionable, user-focused, and kind feedback on accessibility issues</span></li>
    <li><span class="obj-code">3B.02</span><span class="obj-text"><strong>Facilitate accessibility critique sessions:</strong> Lead group reviews with structure, participation management, and psychological safety</span></li>
    <li><span class="obj-code">3B.03</span><span class="obj-text"><strong>Adapt communication for different skill levels:</strong> Adjust your critique for Discover, Define, and untrained designers</span></li>
  </ul>
  <div class="connection-callout"><p>L17 defined the review methodology. L18 defines how to communicate the review so teams act on it.</p></div>
</div>${FT}`},

// ===== 1.1 DIVIDER =====
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Constructive<br>Feedback</div>${FT}`},

// ===== 1.2 FOUR TRAITS =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Four traits of constructive feedback</h1>
  <div class="four-cards">
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Specific</h4>
      <p style="font-size:15px">Name the element, state, or flow</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Actionable</h4>
      <p style="font-size:15px">Make the next step clear</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">User-focused</h4>
      <p style="font-size:15px">Explain the effect on users</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Kind</h4>
      <p style="font-size:15px">Keep critique about the work, not the person</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>If the team cannot tell what to do next, the feedback is incomplete.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3B.01</div>
</div>${FT}`},

// ===== 1.3 SBI AND COIN =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Two useful feedback frameworks</h1>
  <div class="two-col">
    <div class="col-card green-accent">
      <h3>SBI</h3>
      <ul class="bullet-list" style="margin-bottom:16px">
        <li><strong>S</strong>ituation</li>
        <li><strong>B</strong>ehavior</li>
        <li><strong>I</strong>mpact</li>
      </ul>
      <p style="font-size:14px;color:var(--mid);font-style:italic;line-height:1.45">Best when the issue is concrete and localized</p>
    </div>
    <div class="col-card green-accent">
      <h3>COIN</h3>
      <ul class="bullet-list" style="margin-bottom:16px">
        <li><strong>C</strong>ontext</li>
        <li><strong>O</strong>bservation</li>
        <li><strong>I</strong>mpact</li>
        <li><strong>N</strong>ext</li>
      </ul>
      <p style="font-size:14px;color:var(--mid);font-style:italic;line-height:1.45">Best when the team needs a clearer path forward</p>
    </div>
  </div>
  <div class="lo-pill">LO 3B.01</div>
</div>${FT}`},

// ===== 1.4 CHECKPOINT =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Constructive Feedback</h1>
  <p class="slide-intro">Verify you understand what makes feedback useful:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can identify when feedback is too vague to be useful</li>
        <li>I know when SBI or COIN would improve my message</li>
        <li>I can connect a finding to user impact, not just the rule</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3B.01</div>
      <div class="outcome-text">Deliver constructive accessibility feedback: Provide specific, actionable, user-focused, and kind feedback.</div>
    </div>
  </div>
</div>${FT}`},

// ===== 2.1 DIVIDER =====
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Critique<br>Facilitation</div>${FT}`},

// ===== 2.2 CRITIQUE SEQUENCE =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">A simple critique sequence</h1>
  <div class="process-flow">
    <div class="process-step">
      <div class="step-number">1</div>
      <div class="step-content"><h4>Start with scope and goals</h4><p>What are we reviewing, and what decision does this session need to support?</p></div>
    </div>
    <div class="process-step">
      <div class="step-number">2</div>
      <div class="step-content"><h4>Review findings in priority order</h4><p>Critical blockers first, best practices last. Don't let low-severity items consume the time.</p></div>
    </div>
    <div class="process-step">
      <div class="step-number">3</div>
      <div class="step-content"><h4>Keep discussion anchored in user impact</h4><p>When conversation drifts, return to the affected user and the specific barrier.</p></div>
    </div>
    <div class="process-step">
      <div class="step-number">4</div>
      <div class="step-content"><h4>End with clear next steps</h4><p>Who owns what, by when. If there's no owner, it won't happen.</p></div>
    </div>
  </div>
  <div class="lo-pill">LO 3B.02</div>
</div>${FT}`},

// ===== 2.3 PSYCHOLOGICAL SAFETY =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">Keep the critique about the work</h1>
  <div class="two-col">
    <div class="col-card green-accent">
      <h3>What helps</h3>
      <ul class="bullet-list">
        <li>Precise language</li>
        <li>Questions that clarify</li>
        <li>Re-anchoring on users</li>
        <li>Clear distinction between person and artifact</li>
      </ul>
    </div>
    <div class="col-card red-accent">
      <h3>What makes it worse</h3>
      <ul class="bullet-list">
        <li>Loaded language</li>
        <li>Public correction without context</li>
        <li>Debating intent instead of user impact</li>
        <li>Letting side arguments take over</li>
      </ul>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>Defensiveness often drops when the conversation returns to the specific barrier and the affected user.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3B.02</div>
</div>${FT}`},

// ===== 2.4 CHECKPOINT =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Critique Facilitation</h1>
  <p class="slide-intro">Verify you can run or support a short critique without losing focus:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can describe a simple critique structure</li>
        <li>I know one de-escalation move that keeps the discussion productive</li>
        <li>I can keep the highest-priority issue visible when time is limited</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3B.02</div>
      <div class="outcome-text">Facilitate accessibility critique sessions: Lead group reviews with structure, participation management, and psychological safety.</div>
    </div>
  </div>
</div>${FT}`},

// ===== 3.1 DIVIDER =====
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Audience<br>Adaptation</div>${FT}`},

// ===== 3.2 ADJUSTING FOR SKILL LEVEL =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">The same issue, different explanation</h1>
  <div class="three-cards">
    <div class="audience-card">
      <span class="badge-tag tag-discover">Discover Badge</span>
      <h4>Discover-level designer</h4>
      <p>Explain the principle and the user impact. Start from "why this matters" before getting into specifics. Use concrete analogies.</p>
    </div>
    <div class="audience-card">
      <span class="badge-tag tag-define">Define Badge</span>
      <h4>Define-level designer</h4>
      <p>Connect the issue to AT behavior and validation. They know the vocabulary; reference specific criteria and testing methods.</p>
    </div>
    <div class="audience-card">
      <span class="badge-tag tag-untrained">No training</span>
      <h4>Untrained designer</h4>
      <p>Keep it concrete, avoid jargon, explain the consequence. Focus on what the user experiences, not the technical mechanism.</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>Good critique is calibrated. The same wording does not work equally well for every audience.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3B.03</div>
</div>${FT}`},

// ===== 3.3 CHECKPOINT =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Audience Adaptation</h1>
  <p class="slide-intro">Verify you can calibrate communication without losing rigor:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can adapt a critique for different skill levels</li>
        <li>I understand the difference between a mentoring moment and a review moment</li>

let current = 0;
const container = document.getElementById('slideContainer');
const counter = document.getElementById('counter');
function render() {
  container.innerHTML = `<div class="slide ${slides[current].type === 'divider' ? 'divider' : ''} active">${slides[current].html}</div>`;
  counter.textContent = `${current + 1} / ${slides.length}`;
  scaleSlide();
}
function nextSlide() { if (current < slides.length - 1) { current++; render(); } }
function prevSlide() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});
function scaleSlide() {
  const maxW = Math.min(window.innerWidth - 40, 1440);
  const scale = maxW / 1440;
  const slide = document.querySelector('.slide');
  if (slide && scale < 1) { slide.style.transform = `scale(${scale})`; container.style.height = `${900 * scale}px`; }
  else if (slide) { slide.style.transform = 'none'; container.style.height = '900px'; }
}
window.addEventListener('resize', scaleSlide);
render();
</script>
