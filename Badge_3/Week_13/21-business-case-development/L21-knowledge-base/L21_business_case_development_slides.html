const slides = [

// ===== 0.1 TITLE =====
{type:'title', html:`${TB}
<div class="content"><div class="title-content">

  <div class="title-main">Business Case<br>Development</div>
  <div class="title-subtitle">Make accessibility work fundable and visible</div>
  <div class="title-meta"><span>Deliver Badge</span><span>~30 minutes</span><span>In-Person Lesson</span><span>Week 12</span></div>

// ===== 0.2 OBJECTIVES =====
{type:'content', html:`${TB}
<div class="content">

  <p class="slide-body" style="margin-bottom:24px">By the end of this lesson, you'll be able to:</p>

{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Business Case<br>Structure</div>${FT}`},

// ===== 1.2 FOUR PARTS =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">Core parts of the accessibility business case</h1>
  <div class="four-cards">
    <div class="card" style="padding:24px;border-top:3px solid #3478F6">
      <h4 style="font-size:18px;margin-bottom:10px">User reach</h4>

      <h4 style="font-size:18px;margin-bottom:10px">Legal risk</h4>
      <p style="font-size:15px">What exposure or compliance pressure exists. Framework obligations from L20 become concrete here.</p>

    <div class="card" style="padding:24px;border-top:3px solid #BE4BDB">
      <h4 style="font-size:18px;margin-bottom:10px">Brand value</h4>

      <h4 style="font-size:18px;margin-bottom:10px">Efficiency gains</h4>

  <div class="lo-pill" style="margin-top:12px">LO 3F.01</div>
</div>${FT}`},

// ===== 1.3 COST OF INACTION =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Accessibility debt has a real price</h1>
  <div class="two-col">
    <div class="col-card red-accent">
      <h3>If we wait</h3>
      <ul class="bullet-list">
        <li>Rework gets more expensive</li>
        <li>Legal exposure grows</li>
        <li>Customer frustration compounds</li>
        <li>Support and exception handling increase</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px;font-style:italic">Each sprint of delay adds cost that someone eventually pays</p>
    </div>
    <div class="col-card green-accent">
      <h3>If we invest now</h3>
      <ul class="bullet-list">
        <li>Remediation is cheaper</li>
        <li>Quality improves earlier</li>
        <li>Teams build better defaults</li>
        <li>Trust and retention strengthen</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px;font-style:italic">Early investment compounds into better products and lower risk</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>This is not fear-based messaging. It is consequence-based messaging. Teams that understand the cost of delay make better prioritization decisions.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3F.01</div>
</div>${FT}`},

// ===== 1.4 CHECKPOINT =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Business Case Structure</h1>
  <p class="slide-intro">Verify you can build a structured accessibility business case:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can structure a business case around user reach, legal risk, brand value, and efficiency</li>
        <li>I can explain the cost of inaction in product terms</li>
        <li>I know why business framing is different from standards language</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3F.01</div>
      <div class="outcome-text">Build compelling accessibility business cases: Connect accessibility investments to business goals leadership cares about.</div>
    </div>
  </div>
</div>${FT}`},

{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">ROI and<br>Metrics</div>${FT}`},

// ===== 2.2 WHAT TO MEASURE =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Useful ROI signals</h1>
  <div class="three-cards">
    <div class="metric-card">
      <h4>Trend metrics</h4>
      <p>Issue volume, severity distribution, time to remediation. Are things getting better or worse over time?</p>
    </div>
    <div class="metric-card">
      <h4>Product metrics</h4>
      <p>Task success rates, support ticket burden, retention signals. Does accessibility work improve the product?</p>
    </div>
    <div class="metric-card">
      <h4>Process metrics</h4>
      <p>Fewer regressions, less rework, stronger definition of done. Is the team building better defaults?</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>ROI communication gets stronger when it shows direction over time, not a single isolated number. Trends are more persuasive than snapshots.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3F.02</div>
</div>${FT}`},

// ===== 2.3 METRICS TO LEADERSHIP LANGUAGE =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:38px">Translate technical progress into business language</h1>
  <div class="two-col">
    <div class="col-card red-accent">
      <h3>What not to say</h3>
      <ul class="bullet-list">
        <li style="font-style:italic">"We fixed 14 accessibility bugs"</li>
        <li style="font-style:italic">"Screen reader output is cleaner now"</li>
        <li style="font-style:italic">"We improved semantic markup"</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px">Technically accurate, but invisible to leadership. No business consequence attached.</p>
    </div>
    <div class="col-card green-accent">
      <h3>What leaders hear</h3>
      <ul class="bullet-list">
        <li>Reduced critical barriers in a core revenue flow</li>
        <li>Lower risk in a regulated market segment</li>
        <li>Fewer expensive late-stage fixes in the release cycle</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px">Same work, reframed. The technical evidence stays underneath the business statement.</p>
    </div>

{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">Not every case leads with the same lens</h1>
  <div class="two-col">
    <div class="col-card red-accent">
      <h3>High legal exposure</h3>
      <ul class="bullet-list">

// ===== 3.3 PUTTING IT TOGETHER =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">A complete business case combines three layers</h1>
  <div class="three-cards">
    <div class="metric-card">
      <h4>Business-case lenses</h4>
      <p>User reach, legal risk, brand value, efficiency gains. These are the reasons the work matters.</p>
    </div>
    <div class="metric-card">
      <h4>ROI signals</h4>
      <p>Trend metrics, product metrics, process metrics. These are the evidence that the work is having impact.</p>
    </div>
    <div class="metric-card">
      <h4>Cost of inaction</h4>
      <p>What gets more expensive if the work is deferred. This is what makes the timing argument.</p>
    </div>

let current = 0;
const container = document.getElementById('slideContainer');
const counter = document.getElementById('counter');
function render() {
  container.innerHTML = `<div class="slide ${slides[current].type === 'divider' ? 'divider' : ''} active">${slides[current].html}</div>`;
  counter.textContent = `${current + 1} / ${slides.length}`;
  scaleSlide();
}
function nextSlide() { if (current < slides.length - 1) { current++; render(); } }
function prevSlide() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});
function scaleSlide() {
  const maxW = Math.min(window.innerWidth - 40, 1440);
  const scale = maxW / 1440;
  const slide = document.querySelector('.slide');
  if (slide && scale < 1) { slide.style.transform = `scale(${scale})`; container.style.height = `${900 * scale}px`; }
  else if (slide) { slide.style.transform = 'none'; container.style.height = '900px'; }
}
window.addEventListener('resize', scaleSlide);
render();
</script>
