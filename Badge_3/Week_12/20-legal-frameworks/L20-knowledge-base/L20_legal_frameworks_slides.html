// ===== 1.2 TWO CORE FRAMEWORKS =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:40px">US federal context and European harmonized context</h1>
  <div class="two-col">
    <div class="col-card blue-accent">
      <h3>Section 508</h3>
      <ul class="bullet-list">
        <li>US federal procurement standard</li>
        <li>Applies to products sold to federal agencies</li>
        <li>Refreshed in 2017 to incorporate WCAG 2.0 AA</li>
        <li>Key driver for VPAT/ACR documentation</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px;font-style:italic">Primary context: US government and government-adjacent sales</p>
    </div>
    <div class="col-card amber-accent">
      <h3>EN 301 549</h3>
      <ul class="bullet-list">
        <li>European harmonized ICT accessibility standard</li>
        <li>Broader scope than 508: covers web, software, hardware, documents</li>
        <li>Frequently discussed alongside WCAG conformance</li>
        <li>Referenced by the European Accessibility Act</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px;font-style:italic">Primary context: European market obligations and procurement</p>
    </div>
  </div>
  <div class="lo-pill">LO 3E.01</div>
  <div class="lo-pill" style="margin-left:8px">LO 3E.02</div>
</div>${FT}`},

// ===== 1.3 WHY JURISDICTION MATTERS =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">The same product can face different obligations</h1>
  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-icon">🌍</div>
      <h4>Market presence affects risk</h4>
      <p>Where your product is available determines which legal frameworks apply. A product sold only in the US has different obligations than one sold globally.</p>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📋</div>
      <h4>Procurement context affects requirements</h4>
      <p>Government buyers require VPAT documentation. European buyers may require EN 301 549 conformance. Enterprise buyers increasingly ask for both.</p>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🧭</div>
      <h4>Product strategy needs jurisdiction awareness</h4>
      <p>Decisions about which markets to enter, which segments to target, and which features to prioritize all have accessibility compliance implications.</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>Your role is not to be a legal expert. Your role is to know enough to ask the right questions and connect your product team to the right resources.</span></div>

{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">European<br>Accessibility Act</div>${FT}`},

// ===== 2.2 EAA IMPLICATIONS =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Why the EAA matters</h1>
  <div class="two-col">
    <div class="col-card amber-accent">
      <h3>What the EAA changes</h3>
      <ul class="bullet-list">
        <li>Enforcement began June 2025 for new products</li>
        <li>Applies to products and services sold in the EU</li>
        <li>Covers a broad range: e-commerce, banking, transport, and computing</li>
        <li>References EN 301 549 as the presumed conformance path</li>
      </ul>
    </div>
    <div class="col-card blue-accent">
      <h3>What this means for your team</h3>
      <ul class="bullet-list">
        <li>Accessibility needs visibility early in product planning</li>
        <li>Remediation urgency increases for EU-facing products</li>
        <li>Legal risk framing becomes more concrete for PMs</li>
        <li>Timeline pressure means "later" may not be an option</li>
      </ul>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>The EAA is not a future concern. Enforcement is active. Products shipping to EU markets today need to meet these requirements or have a documented remediation path.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3E.03</div>
</div>${FT}`},

{type:'content', html:`${TB}

      <div class="outcome-label">Learning Outcome 3E.03</div>

    </div>
  </div>
</div>${FT}`},

// ===== 3.1 DIVIDER =====
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Legal Risk vs<br>Best Practice</div>${FT}`},

// ===== 3.2 FLOOR VS CEILING =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">Compliance is the floor, not the ceiling</h1>
  <div class="two-col">
    <div class="col-card" style="border-top:3px solid #FA5252">
      <h3>Legal risk</h3>
      <ul class="bullet-list">
        <li>What is legally required in your market</li>
        <li>What creates exposure if unaddressed</li>
        <li>What may demand earlier remediation timelines</li>
        <li>What procurement buyers will evaluate</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px;font-style:italic">This is the floor. Meeting it keeps you out of trouble.</p>
    </div>
    <div class="col-card green-accent">
      <h3>Best practice</h3>
      <ul class="bullet-list">
        <li>What improves usability and quality for all users</li>
        <li>What may exceed the legal minimum</li>
        <li>What strengthens the product experience</li>
        <li>What builds user trust and loyalty</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px;font-style:italic">This is the ceiling. Reaching for it makes the product better.</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>When you prioritize findings, both dimensions matter. A best practice on a high-traffic flow may have more user impact than a compliance gap on a rarely-used feature.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3E.04</div>
</div>${FT}`},

// ===== 3.3 AVOID COMPLIANCE THEATER =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Avoid compliance theater</h1>
  <div class="principles" style="margin-bottom:24px">
    <div class="principle-row">
      <div class="principle-icon">🎯</div>
      <div class="principle-text"><strong>Be precise about what is legally required.</strong> Name the framework, the specific requirement, and the market context. "We have to" without specifics is not helpful.</div>
    </div>
    <div class="principle-row">
      <div class="principle-icon">📈</div>
      <div class="principle-text"><strong>Be clear about what is recommended beyond compliance.</strong> Best practices improve quality but aren't legally mandated. Make the distinction explicit so teams can prioritize wisely.</div>
    </div>
    <div class="principle-row">
      <div class="principle-icon">👤</div>
      <div class="principle-text"><strong>Keep user impact visible alongside legal risk.</strong> Compliance framing motivates action, but user impact framing sustains it. Use both, but lead with users when you can.</div>
    </div>
  </div>
  <div class="warning-callout">
    <strong>Watch out for compliance theater</strong>
    <p>Compliance theater is when teams treat accessibility as a checkbox exercise that satisfies legal requirements on paper without meaningfully improving the user experience. Your job is to prevent this by keeping real users and real barriers at the center of every conversation.</p>
  </div>
  <div class="lo-pill" style="margin-top:12px">LO 3E.04</div>
</div>${FT}`},

let current = 0;
const container = document.getElementById('slideContainer');
const counter = document.getElementById('counter');
function render() {
  container.innerHTML = `<div class="slide ${slides[current].type === 'divider' ? 'divider' : ''} active">${slides[current].html}</div>`;
  counter.textContent = `${current + 1} / ${slides.length}`;
  scaleSlide();
}
function nextSlide() { if (current < slides.length - 1) { current++; render(); } }
function prevSlide() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});
function scaleSlide() {
  const maxW = Math.min(window.innerWidth - 40, 1440);
  const scale = maxW / 1440;
  const slide = document.querySelector('.slide');
  if (slide && scale < 1) { slide.style.transform = `scale(${scale})`; container.style.height = `${900 * scale}px`; }
  else if (slide) { slide.style.transform = 'none'; container.style.height = '900px'; }
}
window.addEventListener('resize', scaleSlide);
render();
</script>
