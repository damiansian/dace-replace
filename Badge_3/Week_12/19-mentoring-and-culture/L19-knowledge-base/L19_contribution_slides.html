<style>

const slides = [

// 0.1 TITLE
{type:'title', html:`${TB}
<div class="content"><div class="title-content">
  <div class="title-lesson-num">Lesson 19</div>
  <div class="title-main">Contribution</div>
  <div class="title-subtitle">Leave artifacts that outlast you</div>
  <div class="title-meta"><span>Deliver Badge</span><span>~20 minutes</span><span>In-Person Lesson</span><span>Week 11</span></div>
</div></div>${FT}`},

// 0.2 OBJECTIVES
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">What you'll be able to do</h1>
  <p class="slide-body" style="margin-bottom:24px">By the end of this lesson, you'll be able to:</p>
  <ul class="objectives-list">
    <li><span class="obj-code">3H.01</span><span class="obj-text"><strong>Contribute reusable accessibility resources:</strong> Create checklists, pattern guidance, onboarding materials, and shared examples that raise the baseline for your team</span></li>

{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Reusable<br>Resources</div>${FT}`},

// 1.2 WHAT TO CONTRIBUTE
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Artifacts that raise the baseline</h1>
  <div class="four-cards">
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Checklists</h4>
      <p style="font-size:15px">Reusable accessibility checklists tied to specific component patterns or workflows, not generic WCAG lists</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Pattern guidance</h4>
      <p style="font-size:15px">Documentation of how to implement common patterns accessibly, grounded in real team examples</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Onboarding materials</h4>
      <p style="font-size:15px">Resources that help new team members understand accessibility expectations without starting from zero</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Shared examples</h4>
      <p style="font-size:15px">Paired good and bad implementations from real work that show what correct looks like alongside what fails</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>The same issues recur because nobody contributes prevention infrastructure. Every resource you create is an issue that doesn't get filed next audit cycle.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3H.01</div>
</div>${FT}`},

// 1.3 GETS USED VS GETS IGNORED
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:40px">Resources that get used vs. resources that get ignored</h1>
  <div class="two-col">
    <div class="col-card green-accent">
      <h3>Gets used</h3>
      <ul class="bullet-list">
        <li>Specific to team patterns and components</li>
        <li>Short enough to reference during work</li>
        <li>Grounded in real examples from the codebase</li>
        <li>Updated when patterns change</li>
        <li>Placed where the work happens (PR templates, component docs)</li>
      </ul>
    </div>
    <div class="col-card red-accent">
      <h3>Gets ignored</h3>
      <ul class="bullet-list">
        <li>Generic WCAG summary copied from the web</li>
        <li>Long document nobody reads after the first week</li>
        <li>Abstract principles with no connection to team code</li>
        <li>Written once and never maintained</li>
        <li>Stored in a wiki nobody visits</li>
      </ul>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>The test of a good contribution is whether someone uses it six months later without being told to.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3H.01</div>
</div>${FT}`},

// 1.4 CHECKPOINT
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Reusable Resources</h1>
  <p class="slide-intro">Verify you can identify a concrete contribution opportunity:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can name one reusable resource I could create for my team</li>
        <li>I understand the difference between a contribution that gets used and one that gets ignored</li>
        <li>I can connect the resource to a specific recurring issue pattern on my team</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3H.01</div>
      <div class="outcome-text">Contribute reusable accessibility resources: checklists, pattern guidance, onboarding materials, and shared examples.</div>
    </div>
  </div>
</div>${FT}`},

// 2.1 DIVIDER
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Communities<br>of Practice</div>${FT}`},

// 2.2 WHY COMMUNITIES MATTER
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">Accessibility capability needs structure</h1>
  <div class="four-cards">
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Shared language</h4>
      <p style="font-size:15px">Common vocabulary so the team can discuss accessibility without translation overhead every time</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Reusable examples</h4>
      <p style="font-size:15px">A library of real findings and solutions that new reviewers can learn from without starting over</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Recurring critique spaces</h4>
      <p style="font-size:15px">Scheduled forums where accessibility gets discussed regularly, not just when something breaks</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Onboarding pathways</h4>
      <p style="font-size:15px">Clear routes for new team members to build accessibility skills incrementally</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>If accessibility depends on one person, progress is fragile. Communities of practice make accessibility visible between formal reviews.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3H.02</div>
</div>${FT}`},

// 2.3 CHECKPOINT
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Communities of Practice</h1>
  <p class="slide-intro">Verify you can describe a durable community structure:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can explain the purpose of a community of practice</li>
        <li>I can name at least one durable structure that spreads accessibility knowledge</li>
        <li>I can connect accessibility culture to team routines, not just individual effort</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3H.02</div>
      <div class="outcome-text">Build accessibility communities of practice: durable structures that spread knowledge beyond individual effort.</div>
    </div>
  </div>
</div>${FT}`},

// 3.1 DIVIDER
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Standards<br>and Systems</div>${FT}`},

// 3.2 PROCESS IMPROVEMENTS
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:38px">Small system changes scale better than repeated explanation</h1>
  <div class="two-col">
    <div class="col-card green-accent">
      <h3>Possible contributions</h3>
      <ul class="bullet-list">
        <li>Accessibility acceptance criteria in user story templates</li>
        <li>Component docs that include accessibility requirements</li>
        <li>PR review checklists with specific accessibility checks</li>
        <li>Definition of done that names accessibility benchmarks</li>
      </ul>
    </div>
    <div class="col-card green-accent">
      <h3>Result</h3>
      <ul class="bullet-list">
        <li>Higher baseline without repeated teaching</li>
        <li>Clearer expectations for new work</li>
        <li>Issues caught at implementation time, not audit time</li>
        <li>Accessibility encoded into process, not dependent on memory</li>
      </ul>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>The highest-leverage contribution is one that changes the default. If the PR template includes an accessibility checklist, every PR gets reviewed. If it doesn't, only the ones you happen to be on get reviewed.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3H.03</div>
</div>${FT}`},

// 3.3 CHECKPOINT
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Standards and Systems</h1>
  <p class="slide-intro">Verify you can identify and make systemic contributions:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can identify one process or standards contribution I could make</li>
        <li>I understand how process-level changes scale better than individual teaching</li>
        <li>I can connect this work to reducing repeated accessibility findings</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3H.03</div>
      <div class="outcome-text">Contribute to organizational standards: process improvements that encode accessibility expectations into team workflows.</div>
    </div>
  </div>
</div>${FT}`},

// 4.1 SUMMARY
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Key takeaways</h1>
  <div class="principles">
    <div class="principle-row">
      <div class="principle-icon">📋</div>
      <div class="principle-text"><strong>Reusable resources raise the baseline.</strong> Checklists, pattern guidance, onboarding materials, and shared examples. Specific, short, and placed where the work happens. The test: does someone use it six months later without being told to?</div>
    </div>
    <div class="principle-row">
      <div class="principle-icon">🏘️</div>
      <div class="principle-text"><strong>Communities of practice make contributions durable.</strong> Shared language, recurring critique spaces, and onboarding pathways keep accessibility visible between reviews. A checklist alone can be forgotten. A recurring session keeps it alive.</div>
    </div>
    <div class="principle-row">
      <div class="principle-icon">⚙️</div>
      <div class="principle-text"><strong>Standards and process changes are the highest leverage.</strong> A PR template with an accessibility checklist reaches every PR, not just the ones you review. The highest-leverage contribution is one that changes the default.</div>
    </div>
  </div>
</div>${FT}`},

{type:'content', html:`${TB}

</div>${FT}`}

];

  scaleSlide();
}
function nextSlide() { if (current < slides.length - 1) { current++; render(); } }
function prevSlide() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});
function scaleSlide() {
  const maxW = Math.min(window.innerWidth - 40, 1440);
  const scale = maxW / 1440;
  const slide = document.querySelector('.slide');
  if (slide && scale < 1) { slide.style.transform = `scale(${scale})`; container.style.height = `${900 * scale}px`; }
  else if (slide) { slide.style.transform = 'none'; container.style.height = '900px'; }
}
window.addEventListener('resize', scaleSlide);
render();
</script>
</body>
</html>
