  .key-insight::after{content:'💡';position:absolute;left:25px;top:50%;transform:translateY(-50%);font-size:16px}

const TB = `<div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 8l3 3-3 3"/></svg></div><span class="topbar-lesson">Lesson 19</span><span class="topbar-sep">|</span><span class="topbar-topic">Mentoring and Culture</span></div><div class="badge-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Deliver Badge</div></div>`;
const TB_PLAIN = `<div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 8l3 3-3 3"/></svg></div><span class="topbar-lesson">Lesson 19</span><span class="topbar-sep">|</span><span class="topbar-topic">Mentoring and Culture</span></div></div>`;
const FT = `<div class="footer-text">Design Accessibility Certified Expert (DACE)<br>Cohort 1: 2025 – 2026</div>`;
const GEO = `<div class="divider-bg"><svg class="geo" style="left:-20px;top:80px" width="120" height="120" viewBox="0 0 120 120"><polygon points="60,0 120,120 0,120"/></svg><svg class="geo" style="left:-10px;top:320px" width="100" height="100" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80"/></svg><svg class="geo" style="left:-5px;top:540px" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"/></svg></div>`;

const slides = [

// ===== 0.1 TITLE =====
{type:'title', html:`${TB}
<div class="content"><div class="title-content">
  <div class="title-lesson-num">Lesson 19</div>
  <div class="title-main">Mentoring and Culture</div>
  <div class="title-subtitle">Build accessibility capability beyond yourself</div>
  <div class="title-meta"><span>Deliver Badge</span><span>~20 minutes</span><span>In-Person Lesson</span><span>Week 11</span></div>
</div></div>${FT}`},

// ===== 0.2 OBJECTIVES =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">What you'll be able to do</h1>
  <p class="slide-body" style="margin-bottom:24px">By the end of this lesson, you'll be able to:</p>
  <ul class="objectives-list">
    <li><span class="obj-code">3H.01</span><span class="obj-text"><strong>Mentor designers at different skill levels:</strong> Calibrate support for Discover, Define, and untrained designers</span></li>
    <li><span class="obj-code">3H.02</span><span class="obj-text"><strong>Build accessibility communities of practice:</strong> Create durable structures that spread accessibility knowledge beyond individual effort</span></li>
    <li><span class="obj-code">3H.03</span><span class="obj-text"><strong>Contribute to organizational standards:</strong> Identify and make process improvements that raise the accessibility baseline across teams</span></li>
  </ul>
  <div class="connection-callout"><p>L19 turns accessibility leadership into organizational practice: mentoring, community, and standards. This is where individual expertise becomes durable capability.</p></div>
</div>${FT}`},

// ===== 1.1 DIVIDER =====
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Mentoring<br>by Skill Level</div>${FT}`},

// ===== 1.2 CALIBRATE MENTORING =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Calibrate the mentoring approach</h1>
  <div class="three-cards">
    <div class="audience-card">
      <span class="badge-tag tag-discover">Discover Badge</span>
      <h4>Fundamentals and pattern recognition</h4>
      <p>Focus on building awareness. Help them see accessibility as a design quality dimension, not a separate checklist. Use concrete examples from their own work. Explain the "why" before the "how."</p>
    </div>
    <div class="audience-card">
      <span class="badge-tag tag-define">Define Badge</span>
      <h4>AT behavior and validation reasoning</h4>
      <p>They know the vocabulary. Connect issues to specific assistive technology behavior and WCAG criteria. Push them toward independent judgment, not just following rules.</p>
    </div>
    <div class="audience-card">
      <span class="badge-tag tag-untrained">No training</span>
      <h4>Concrete language, minimal jargon</h4>
      <p>Keep it grounded. Describe what the user experiences, not the technical mechanism. Show, don't tell. A 30-second VoiceOver demo teaches more than a 10-minute explanation.</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>Mentoring quality depends on matching the explanation to the learner's current level. Over-explaining creates noise; under-explaining creates confusion.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3H.01</div>
</div>${FT}`},

// ===== 1.3 MENTORING VS REVIEW =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">Build understanding vs. evaluate the work</h1>
  <div class="two-col">
    <div class="col-card green-accent">
      <h3>Mentoring moment</h3>
      <ul class="bullet-list">
        <li>Explain concepts</li>
        <li>Build judgment</li>
        <li>Slow down for learning</li>
        <li>Invest in the person's growth</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px;font-style:italic">Goal: the designer understands the principle and can apply it independently next time</p>
    </div>
    <div class="col-card gray-accent">
      <h3>Review moment</h3>
      <ul class="bullet-list">
        <li>Evaluate current work</li>
        <li>Clarify action</li>
        <li>Keep the decision visible</li>
        <li>Move the project forward</li>
      </ul>
      <p style="font-size:13px;color:var(--mid);margin-top:16px;font-style:italic">Goal: the team knows what to fix, who owns it, and by when</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>Both matter. Confusing them weakens either the teaching or the review. Know which mode you're in.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3H.01</div>
</div>${FT}`},

// ===== 1.4 CHECKPOINT =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Mentoring</h1>
  <p class="slide-intro">Verify you can mentor effectively across skill levels:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can adjust support by skill level</li>
        <li>I can separate mentoring from review</li>
        <li>I know which leadership qualities matter most in practice</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3H.01</div>
      <div class="outcome-text">Mentor designers at different skill levels: Calibrate support for Discover, Define, and untrained designers.</div>
    </div>
  </div>
</div>${FT}`},

// ===== 2.1 DIVIDER =====
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Communities<br>of Practice</div>${FT}`},

// ===== 2.2 WHY COMMUNITIES MATTER =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:42px">Accessibility capability needs structure</h1>
  <div class="four-cards">
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Shared language</h4>
      <p style="font-size:15px">Common vocabulary and mental models so the team can discuss accessibility without translation overhead</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Reusable examples</h4>
      <p style="font-size:15px">A library of real findings, patterns, and solutions that new reviewers can learn from</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Recurring critique spaces</h4>
      <p style="font-size:15px">Scheduled forums where accessibility gets discussed regularly, not just when something breaks</p>
    </div>
    <div class="card" style="padding:24px">
      <h4 style="font-size:18px;margin-bottom:10px">Onboarding pathways</h4>
      <p style="font-size:15px">Clear routes for new team members to build accessibility skills without starting from zero</p>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>If accessibility depends on one person, progress is fragile. Communities of practice make accessibility visible between formal reviews.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3H.02</div>
</div>${FT}`},

// ===== 2.3 CHECKPOINT =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Communities of Practice</h1>
  <p class="slide-intro">Verify you understand how to build durable accessibility culture:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can explain the purpose of a community of practice</li>
        <li>I can name at least one durable structure that spreads accessibility knowledge</li>
        <li>I can connect accessibility culture to team routines, not just individual effort</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3H.02</div>
      <div class="outcome-text">Build accessibility communities of practice: Create durable structures that spread knowledge beyond individual effort.</div>
    </div>
  </div>
</div>${FT}`},

// ===== 3.1 DIVIDER =====
{type:'divider', html:`${TB_PLAIN}${GEO}<div class="divider-title">Standards<br>and Systems</div>${FT}`},

// ===== 3.2 PROCESS IMPROVEMENTS =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline" style="font-size:38px">Small system changes scale better than repeated explanation</h1>
  <div class="two-col">
    <div class="col-card green-accent">
      <h3>Possible contributions</h3>
      <ul class="bullet-list">
        <li>Onboarding notes for new team members</li>
        <li>Reusable accessibility checklists</li>
        <li>Pattern guidance for common components</li>
        <li>Shared examples from real reviews</li>
      </ul>
    </div>
    <div class="col-card green-accent">
      <h3>Result</h3>
      <ul class="bullet-list">
        <li>Higher baseline across the team</li>
        <li>Less repeated teaching</li>
        <li>Clearer expectations for new work</li>
        <li>Better accessibility by default</li>
      </ul>
    </div>
  </div>
  <div class="key-insight"><strong>Key insight</strong><span>This is how individual expertise becomes organizational improvement. One good checklist, used by 20 designers, has more impact than 20 individual explanations.</span></div>
  <div class="lo-pill" style="margin-top:12px">LO 3H.03</div>
</div>${FT}`},

// ===== 3.3 CHECKPOINT =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Checkpoint: Standards and Systems</h1>
  <p class="slide-intro">Verify you can identify and contribute to systemic improvements:</p>
  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:start">
    <div>
      <h2 class="slide-subhead">Checklist:</h2>
      <ul class="checklist">
        <li>I can identify one standards or process contribution I could make</li>
        <li>I understand how systems work supports accessibility culture</li>
        <li>I can connect this work to broader inclusion goals</li>
      </ul>
    </div>
    <div class="outcome-card">
      <div class="outcome-icon">💡</div>
      <div class="outcome-label">Learning Outcome 3H.03</div>
      <div class="outcome-text">Contribute to organizational standards: Identify and make process improvements that raise the accessibility baseline.</div>
    </div>
  </div>
</div>${FT}`},

// ===== 4.1 SUMMARY =====
{type:'content', html:`${TB}
<div class="content">
  <h1 class="slide-headline">Key takeaways</h1>
  <div class="principles">
    <div class="principle-row">
      <div class="principle-icon">🧑‍🏫</div>
      <div class="principle-text"><strong>Mentoring should match the learner's current level.</strong> Discover designers need principles and pattern recognition. Define designers need AT behavior and validation reasoning. Untrained designers need concrete language and visible consequences.</div>
    </div>
    <div class="principle-row">
      <div class="principle-icon">🏘️</div>
      <div class="principle-text"><strong>Communities of practice make accessibility durable.</strong> Shared language, reusable examples, recurring critique spaces, and onboarding pathways turn individual knowledge into team capability.</div>
    </div>
    <div class="principle-row">
      <div class="principle-icon">⚙️</div>
      <div class="principle-text"><strong>Standards and onboarding raise the baseline across teams.</strong> Small system changes scale better than repeated explanation. One good checklist used by 20 designers has more impact than 20 individual conversations.</div>
    </div>
  </div>
</div>${FT}`},

{type:'content', html:`${TB}
<div class="content" style="display:flex;flex-direction:column;justify-content:center;height:calc(100% - 64px);padding-top:0;padding-bottom:0">
  <h1 class="slide-headline">Up next: Week 12</h1>
  <p class="slide-body" style="font-size:20px;max-width:800px;margin-bottom:32px">Week 12 moves from internal capability-building to organizational decision-making through legal frameworks and business-case development.</p>
  <div class="connection-callout"><p>L17 gave you the review methodology. L18 gave you the communication skills. L19 gave you the organizational playbook. Week 12 connects all of this to the legal and business context that shapes how organizations invest in accessibility.</p></div>
</div>${FT}`}

];

let current = 0;
const container = document.getElementById('slideContainer');
const counter = document.getElementById('counter');
function render() {
  container.innerHTML = `<div class="slide ${slides[current].type === 'divider' ? 'divider' : ''} active">${slides[current].html}</div>`;
  counter.textContent = `${current + 1} / ${slides.length}`;
  scaleSlide();
}
function nextSlide() { if (current < slides.length - 1) { current++; render(); } }
function prevSlide() { if (current > 0) { current--; render(); } }
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});
function scaleSlide() {
  const maxW = Math.min(window.innerWidth - 40, 1440);
  const scale = maxW / 1440;
  const slide = document.querySelector('.slide');
  if (slide && scale < 1) { slide.style.transform = `scale(${scale})`; container.style.height = `${900 * scale}px`; }
  else if (slide) { slide.style.transform = 'none'; container.style.height = '900px'; }
}
window.addEventListener('resize', scaleSlide);
render();
</script>
</body>
</html>
