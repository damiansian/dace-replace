<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adobe Firefly - Card UI Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 40px;
      color: #1a1a1a;
    }

    .card-ui {
      max-width: 820px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }

    .card-ui h2 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card-image-wrapper {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .card-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      font-weight: 600;
    }

    .card-image-placeholder.img1 {
      background: linear-gradient(135deg, #6dd5ed, #2193b0, #8e44ad);
    }

    .card-image-placeholder.img2 {
      background: linear-gradient(135deg, #f093fb, #f5576c, #ff9a44);
    }

    .card-image-placeholder.img3 {
      background: linear-gradient(135deg, #667eea, #43e97b, #38f9d7);
    }

    .card h3 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 24px;
      border: 2px solid #1a1a1a;
      border-radius: 24px;
      background: transparent;
      color: #1a1a1a;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .open-link:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

  <div class="card-ui">
    <h2>Ideate with Adobe Firefly</h2>

    <div class="cards-grid">

      <!-- Card 1: Text to image -->
      <div class="card">
        <div class="card-image-wrapper">
          <div class="card-image-placeholder img1" role="img" aria-hidden="true"></div>
        </div>
        <h3 id="heading-text-to-image">Text to image</h3>
        <p>Generate high-quality images using text with latest Image Model 4.</p>
        <a href="#" class="open-link" id="link-text-to-image" aria-labelledby="link-text-to-image heading-text-to-image">Open</a>
      </div>

      <!-- Card 2: Generate video -->
      <div class="card">
        <div class="card-image-wrapper">
          <div class="card-image-placeholder img2" role="img" aria-hidden="true"></div>
        </div>
        <h3 id="heading-generate-video">Generate video</h3>
        <p>Transform ideas into stunning video using an image or text prompt.</p>
        <a href="#" class="open-link" id="link-generate-video" aria-labelledby="link-generate-video heading-generate-video">Open</a>
      </div>

      <!-- Card 3: Text to vector -->
      <div class="card">
        <div class="card-image-wrapper">
          <div class="card-image-placeholder img3" role="img" aria-hidden="true"></div>
        </div>
        <h3 id="heading-text-to-vector">Text to vector</h3>
        <p>Generate SVGs from a detailed text description.</p>
        <a href="#" class="open-link" id="link-text-to-vector" aria-labelledby="link-text-to-vector heading-text-to-vector">Open</a>
      </div>

    </div>
  </div>

</body>
</html>
